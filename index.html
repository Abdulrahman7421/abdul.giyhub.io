<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arena Duels — 1v1 Battle Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #ef9f27;
      --gold-dim: rgba(239,159,39,0.3);
      --dark: #100e08;
      --dark2: #1a1610;
      --dark3: #221e14;
      --parchment: #f5e9c8;
      --parchment-dim: rgba(245,233,200,0.55);
      --parchment-faint: rgba(245,233,200,0.2);
      --red: #e24b4a;
      --blue: #378add;
      --green: #639922;
      --mana-color: #378add;
    }

    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IM Fell English', serif;
      color: var(--parchment);
      padding: 20px;
    }

    /* ─── Scanline texture overlay ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    #app {
      width: 100%;
      max-width: 740px;
      position: relative;
    }

    /* ─── OVERLAY SCREENS ─── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 500px;
      background: var(--dark2);
      border: 1px solid var(--gold-dim);
      border-radius: 12px;
      padding: 32px 24px;
      text-align: center;
    }
    .screen.active { display: flex; }

    .screen-title {
      font-family: 'Cinzel', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 4px;
      text-shadow: 0 0 30px rgba(239,159,39,0.5);
      margin-bottom: 6px;
    }
    .screen-subtitle {
      font-size: 13px;
      color: var(--parchment-dim);
      letter-spacing: 2px;
      margin-bottom: 28px;
    }

    /* Class picker */
    .pickers-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 28px;
    }
    .picker-col label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: var(--parchment-dim);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .class-options { display: flex; flex-direction: column; gap: 8px; }
    .class-btn {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(239,159,39,0.25);
      color: var(--parchment-dim);
      font-family: 'IM Fell English', serif;
      font-size: 14px;
      padding: 9px 14px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: all 0.18s;
    }
    .class-btn:hover { border-color: rgba(239,159,39,0.55); color: var(--parchment); background: rgba(239,159,39,0.07); }
    .class-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(239,159,39,0.12); }
    .class-btn .stats { display: block; font-size: 11px; color: rgba(245,233,200,0.35); margin-top: 2px; }
    .class-btn.active .stats { color: rgba(239,159,39,0.5); }

    /* Start / Restart button */
    .big-btn {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      letter-spacing: 3px;
      color: var(--gold);
      background: rgba(239,159,39,0.1);
      border: 1px solid var(--gold);
      border-radius: 7px;
      padding: 12px 36px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .big-btn:hover { background: rgba(239,159,39,0.22); }

    /* ─── BATTLE SCREEN ─── */
    #battle-screen {
      background: var(--dark2);
      border: 1px solid var(--gold-dim);
      border-radius: 12px;
      padding: 20px 18px 16px;
    }

    .battle-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .battle-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--gold);
      letter-spacing: 3px;
    }
    .turn-badge {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      background: rgba(239,159,39,0.08);
      transition: all 0.3s;
    }

    /* Fighter panels */
    .arena-row {
      display: grid;
      grid-template-columns: 1fr 52px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .fighter-panel {
      background: var(--dark3);
      border: 1px solid rgba(239,159,39,0.2);
      border-radius: 8px;
      padding: 12px 14px;
      position: relative;
      transition: border-color 0.3s;
    }
    .fighter-panel.active-turn { border-color: rgba(239,159,39,0.55); }

    .fighter-name {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .fighter-sprite {
      font-size: 44px;
      line-height: 1;
      text-align: center;
      display: block;
      margin: 4px 0 8px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));
      transition: transform 0.15s;
    }
    .p2-panel .fighter-sprite { transform: scaleX(-1); }

    /* Animations */
    @keyframes atk { 0%{transform:translateX(0) scale(1)} 40%{transform:translateX(-20px) scale(1.15)} 100%{transform:translateX(0) scale(1)} }
    @keyframes atk-r { 0%{transform:scaleX(-1) translateX(0)} 40%{transform:scaleX(-1) translateX(-20px)} 100%{transform:scaleX(-1) translateX(0)} }
    @keyframes hit { 0%{transform:translateX(0)} 25%{transform:translateX(12px) scale(0.9)} 100%{transform:translateX(0) scale(1)} }
    @keyframes hit-r { 0%{transform:scaleX(-1) translateX(0)} 25%{transform:scaleX(-1) translateX(12px)} 100%{transform:scaleX(-1) translateX(0)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    .anim-attack .fighter-sprite { animation: atk 0.35s ease !important; }
    .p2-panel.anim-attack .fighter-sprite { animation: atk-r 0.35s ease !important; }
    .anim-hit .fighter-sprite { animation: hit 0.3s ease !important; }
    .p2-panel.anim-hit .fighter-sprite { animation: hit-r 0.3s ease !important; }
    .anim-shake { animation: shake 0.35s ease; }

    /* HP / MP bars */
    .bar-label { font-size: 11px; color: rgba(245,233,200,0.45); margin-bottom: 3px; display: flex; justify-content: space-between; }
    .bar-track {
      background: rgba(0,0,0,0.55);
      border-radius: 4px;
      height: 12px;
      overflow: hidden;
      border: 0.5px solid rgba(255,255,255,0.08);
      margin-bottom: 6px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.45s ease;
    }
    .hp-fill { background: linear-gradient(90deg, #a32d2d 0%, #e24b4a 100%); }
    .mp-fill { background: linear-gradient(90deg, #185fa5 0%, #378add 100%); }

    /* Status icons */
    .statuses { display: flex; gap: 4px; flex-wrap: wrap; min-height: 20px; margin-top: 2px; }
    .status-icon {
      font-size: 13px;
      padding: 1px 6px;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      border: 0.5px solid rgba(255,255,255,0.12);
      font-style: normal;
    }

    .vs-divider {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--red);
      text-align: center;
      text-shadow: 0 0 12px rgba(226,75,74,0.5);
    }

    /* ─── Actions ─── */
    .actions-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .actions-col-label {
      font-size: 10px;
      color: var(--parchment-faint);
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 6px;
    }
    .action-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.38);
      border: 1px solid rgba(239,159,39,0.22);
      color: var(--parchment-dim);
      font-family: 'IM Fell English', serif;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-bottom: 5px;
      transition: all 0.17s;
      position: relative;
    }
    .action-btn:last-child { margin-bottom: 0; }
    .action-btn:hover:not(:disabled) {
      border-color: var(--gold-dim);
      color: var(--parchment);
      background: rgba(239,159,39,0.08);
    }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .action-btn .meta { display: flex; gap: 6px; align-items: center; }
    .action-btn .mp-cost { font-size: 11px; color: var(--mana-color); }
    .action-btn .dmg-range { font-size: 11px; color: rgba(245,233,200,0.35); }

    /* ─── Battle Log ─── */
    .log-box {
      background: rgba(0,0,0,0.45);
      border: 0.5px solid rgba(239,159,39,0.18);
      border-radius: 7px;
      padding: 10px 12px;
      height: 130px;
      overflow-y: auto;
      font-size: 12.5px;
      line-height: 1.7;
      scroll-behavior: smooth;
    }
    .log-box::-webkit-scrollbar { width: 4px; }
    .log-box::-webkit-scrollbar-track { background: transparent; }
    .log-box::-webkit-scrollbar-thumb { background: rgba(239,159,39,0.25); border-radius: 2px; }
    .log-entry { border-bottom: 0.5px solid rgba(255,255,255,0.04); padding: 1px 0; }
    .log-p1 { color: #f0995b; }
    .log-p2 { color: #85b7eb; }
    .log-sys { color: var(--gold); font-style: italic; }
    .log-crit { color: #f09595; font-weight: bold; }

    /* ─── Floating damage numbers ─── */
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-70px) scale(1.2)} }
    .float-num {
      position: absolute;
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 700;
      pointer-events: none;
      z-index: 50;
      animation: floatUp 1.1s ease forwards;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    /* ─── Winner Screen ─── */
    .winner-badge {
      font-size: 56px;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 16px rgba(239,159,39,0.4));
    }
    .winner-name {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      color: var(--gold);
      letter-spacing: 3px;
      margin-bottom: 6px;
    }
    .winner-msg {
      font-size: 14px;
      color: var(--parchment-dim);
      font-style: italic;
      margin-bottom: 28px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 520px) {
      .arena-row { grid-template-columns: 1fr 36px 1fr; }
      .fighter-sprite { font-size: 34px; }
      .battle-title { font-size: 14px; }
      .actions-row { gap: 6px; }
      .action-btn { font-size: 12px; padding: 7px 8px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── SELECT SCREEN ── -->
  <div id="select-screen" class="screen active">
    <div class="screen-title">⚔ ARENA DUELS ⚔</div>
    <div class="screen-subtitle">CHOOSE YOUR WARRIORS</div>
    <div class="pickers-row">
      <div class="picker-col">
        <label>PLAYER 1</label>
        <div class="class-options" id="p1-picker"></div>
      </div>
      <div class="picker-col">
        <label>PLAYER 2</label>
        <div class="class-options" id="p2-picker"></div>
      </div>
    </div>
    <button class="big-btn" onclick="startBattle()">BEGIN BATTLE</button>
  </div>

  <!-- ── BATTLE SCREEN ── -->
  <div id="battle-screen" class="screen" style="flex-direction:column;align-items:stretch;">
    <div class="battle-header">
      <div class="battle-title">⚔ ARENA DUELS</div>
      <div class="turn-badge" id="turn-badge">PLAYER 1's TURN</div>
    </div>

    <div class="arena-row">
      <div class="fighter-panel active-turn" id="p1-panel">
        <div class="fighter-name" id="p1-name">—</div>
        <span class="fighter-sprite" id="p1-sprite">🧙</span>
        <div class="bar-label"><span>HP</span><span id="p1-hp-val">100/100</span></div>
        <div class="bar-track"><div class="bar-fill hp-fill" id="p1-hp-bar" style="width:100%"></div></div>
        <div class="bar-label"><span>MP</span><span id="p1-mp-val">50/50</span></div>
        <div class="bar-track"><div class="bar-fill mp-fill" id="p1-mp-bar" style="width:100%"></div></div>
        <div class="statuses" id="p1-statuses"></div>
      </div>

      <div class="vs-divider">VS</div>

      <div class="fighter-panel p2-panel" id="p2-panel">
        <div class="fighter-name" id="p2-name">—</div>
        <span class="fighter-sprite" id="p2-sprite">🧙</span>
        <div class="bar-label"><span>HP</span><span id="p2-hp-val">100/100</span></div>
        <div class="bar-track"><div class="bar-fill hp-fill" id="p2-hp-bar" style="width:100%"></div></div>
        <div class="bar-label"><span>MP</span><span id="p2-mp-val">50/50</span></div>
        <div class="bar-track"><div class="bar-fill mp-fill" id="p2-mp-bar" style="width:100%"></div></div>
        <div class="statuses" id="p2-statuses"></div>
      </div>
    </div>

    <div class="actions-row">
      <div>
        <div class="actions-col-label" id="p1-col-label">PLAYER 1 ACTIONS</div>
        <div id="p1-actions"></div>
      </div>
      <div>
        <div class="actions-col-label" id="p2-col-label">PLAYER 2 ACTIONS</div>
        <div id="p2-actions"></div>
      </div>
    </div>

    <div class="log-box" id="log"></div>
  </div>

  <!-- ── WINNER SCREEN ── -->
  <div id="winner-screen" class="screen">
    <div class="winner-badge" id="winner-emoji">🏆</div>
    <div class="winner-name" id="winner-name">PLAYER 1</div>
    <div class="winner-msg" id="winner-msg">is victorious!</div>
    <button class="big-btn" onclick="goToSelect()">⚔ FIGHT AGAIN</button>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const CLASSES = [
  {
    name: 'Warrior', emoji: '⚔️', sprite: '🧔',
    hp: 140, mp: 30, color: '#e24b4a',
    description: '140hp • 30mp • Tough brawler',
    actions: [
      { name: 'Heavy Strike',  dmg: [20, 28], mpCost: 0,  desc: 'A mighty blow' },
      { name: 'Quick Slash',   dmg: [10, 15], mpCost: 0,  hits: 2, desc: 'Two fast cuts' },
      { name: 'Battle Cry',    dmg: [8,  13], mpCost: 8,  buff: true, desc: 'Boost next hit' },
      { name: 'Shield Bash',   dmg: [6,  10], mpCost: 6,  stun: true, desc: 'May stun foe' },
    ]
  },
  {
    name: 'Mage', emoji: '🔮', sprite: '🧙',
    hp: 90, mp: 80, color: '#378add',
    description: '90hp • 80mp • Powerful spells',
    actions: [
      { name: 'Fireball',      dmg: [24, 34], mpCost: 18, desc: 'Blazing inferno' },
      { name: 'Ice Bolt',      dmg: [16, 22], mpCost: 10, slow: true, desc: 'Slows the enemy' },
      { name: 'Arcane Blast',  dmg: [12, 18], mpCost: 6,  desc: 'Pure magic' },
      { name: 'Mana Shield',   dmg: [0,  0],  mpCost: 14, shield: 35, desc: 'Absorb damage' },
    ]
  },
  {
    name: 'Rogue', emoji: '🗡️', sprite: '🥷',
    hp: 100, mp: 50, color: '#97c459',
    description: '100hp • 50mp • Fast & tricky',
    actions: [
      { name: 'Backstab',      dmg: [22, 32], mpCost: 10, crit: 0.4, desc: 'Deadly precision' },
      { name: 'Poison Blade',  dmg: [10, 14], mpCost: 8,  poison: 8, desc: 'Applies poison' },
      { name: 'Dual Strike',   dmg: [9,  13], mpCost: 0,  hits: 2,   desc: 'Twin blades' },
      { name: 'Smoke Bomb',    dmg: [0,  0],  mpCost: 10, evade: true, desc: 'Dodge next hit' },
    ]
  },
  {
    name: 'Paladin', emoji: '🛡️', sprite: '🧝',
    hp: 120, mp: 60, color: '#ef9f27',
    description: '120hp • 60mp • Holy healer',
    actions: [
      { name: 'Holy Smite',    dmg: [16, 24], mpCost: 10, desc: 'Divine wrath' },
      { name: 'Consecrate',    dmg: [12, 18], mpCost: 12, desc: 'Sacred ground' },
      { name: 'Lay on Hands',  dmg: [0,  0],  mpCost: 20, heal: 38,  desc: 'Restore HP' },
      { name: 'Divine Shield', dmg: [0,  0],  mpCost: 16, shield: 45, desc: 'Holy barrier' },
    ]
  },
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let p1Choice = 0, p2Choice = 1;
let gs = {}; // game state

function makeChar(cls) {
  return {
    name: cls.name, sprite: cls.sprite, color: cls.color,
    actions: cls.actions,
    hp: cls.hp, maxHp: cls.hp,
    mp: cls.mp, maxMp: cls.mp,
    shield: 0, poison: 0,
    buffed: false, stunned: false, slowed: false, evade: false,
  };
}

// ─────────────────────────────────────────────
//  SCREEN MANAGEMENT
// ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─────────────────────────────────────────────
//  SELECT SCREEN
// ─────────────────────────────────────────────
function buildPickers() {
  ['p1-picker', 'p2-picker'].forEach((id, pi) => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    CLASSES.forEach((cls, i) => {
      const btn = document.createElement('button');
      btn.className = 'class-btn' + (((pi === 0 && i === p1Choice) || (pi === 1 && i === p2Choice)) ? ' active' : '');
      btn.innerHTML = `${cls.emoji} ${cls.name}<span class="stats">${cls.description}</span>`;
      btn.onclick = () => {
        if (pi === 0) p1Choice = i; else p2Choice = i;
        buildPickers();
      };
      el.appendChild(btn);
    });
  });
}

// ─────────────────────────────────────────────
//  START BATTLE
// ─────────────────────────────────────────────
function startBattle() {
  gs = {
    p1: makeChar(CLASSES[p1Choice]),
    p2: makeChar(CLASSES[p2Choice]),
    turn: 1,
    over: false,
  };
  showScreen('battle-screen');
  renderAll();
  buildActions();
  addLog(`⚔ The battle begins! ${gs.p1.name} vs ${gs.p2.name}!`, 'sys');
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderAll() {
  renderFighter(1);
  renderFighter(2);
  renderTurnBadge();
  setActionsEnabled();
}

function renderFighter(p) {
  const s = p === 1 ? gs.p1 : gs.p2;
  const pre = `p${p}`;
  document.getElementById(`${pre}-name`).textContent = s.name;
  document.getElementById(`${pre}-sprite`).textContent = s.sprite;

  const hpPct = Math.max(0, (s.hp / s.maxHp) * 100);
  const mpPct = Math.max(0, (s.mp / s.maxMp) * 100);
  document.getElementById(`${pre}-hp-bar`).style.width = hpPct + '%';
  document.getElementById(`${pre}-mp-bar`).style.width = mpPct + '%';
  document.getElementById(`${pre}-hp-val`).textContent = `${Math.max(0,s.hp)}/${s.maxHp}`;
  document.getElementById(`${pre}-mp-val`).textContent = `${s.mp}/${s.maxMp}`;

  // Color hp bar based on health
  const hpBar = document.getElementById(`${pre}-hp-bar`);
  if (hpPct > 60) hpBar.style.background = 'linear-gradient(90deg,#3b6d11,#97c459)';
  else if (hpPct > 30) hpBar.style.background = 'linear-gradient(90deg,#ba7517,#ef9f27)';
  else hpBar.style.background = 'linear-gradient(90deg,#a32d2d,#e24b4a)';

  // Statuses
  const stEl = document.getElementById(`${pre}-statuses`);
  stEl.innerHTML = '';
  if (s.poison > 0)   stEl.innerHTML += `<span class="status-icon" title="Poisoned">☠️${s.poison}</span>`;
  if (s.shield > 0)   stEl.innerHTML += `<span class="status-icon" title="Shield">🛡️${s.shield}</span>`;
  if (s.buffed)       stEl.innerHTML += `<span class="status-icon" title="Attack buffed">💪</span>`;
  if (s.stunned)      stEl.innerHTML += `<span class="status-icon" title="Stunned">💫</span>`;
  if (s.slowed)       stEl.innerHTML += `<span class="status-icon" title="Slowed">🧊</span>`;
  if (s.evade)        stEl.innerHTML += `<span class="status-icon" title="Will dodge">💨</span>`;

  // Active turn border
  const panel = document.getElementById(`${pre}-panel`);
  panel.classList.toggle('active-turn', gs.turn === p);
}

function renderTurnBadge() {
  const p = gs.turn === 1 ? gs.p1 : gs.p2;
  document.getElementById('turn-badge').textContent = `${p.name.toUpperCase()}'S TURN`;
}

// ─────────────────────────────────────────────
//  ACTION BUTTONS
// ─────────────────────────────────────────────
function buildActions() {
  [1, 2].forEach(p => {
    const s = p === 1 ? gs.p1 : gs.p2;
    const container = document.getElementById(`p${p}-actions`);
    container.innerHTML = '';
    s.actions.forEach((a, i) => {
      const btn = document.createElement('button');
      btn.className = 'action-btn';
      btn.id = `p${p}-act-${i}`;

      let dmgText = '';
      if (a.heal)          dmgText = `<span class="dmg-range" style="color:#97c459">+${a.heal}hp</span>`;
      else if (a.dmg[1]>0) dmgText = `<span class="dmg-range">${a.dmg[0]}-${a.dmg[1]}</span>`;
      else if (a.shield)   dmgText = `<span class="dmg-range" style="color:#ef9f27">🛡️${a.shield}</span>`;
      else if (a.evade)    dmgText = `<span class="dmg-range" style="color:#97c459">dodge</span>`;

      const mpText = a.mpCost ? `<span class="mp-cost">${a.mpCost}mp</span>` : '';

      btn.innerHTML = `<span>${a.name}</span><span class="meta">${dmgText}${mpText}</span>`;
      btn.title = a.desc || '';
      btn.onclick = () => doAction(p, i);
      container.appendChild(btn);
    });
  });
}

function setActionsEnabled() {
  if (gs.over) {
    document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
    return;
  }
  [1, 2].forEach(p => {
    const s = p === 1 ? gs.p1 : gs.p2;
    s.actions.forEach((a, i) => {
      const btn = document.getElementById(`p${p}-act-${i}`);
      if (!btn) return;
      btn.disabled = (p !== gs.turn);
    });
  });
}

// ─────────────────────────────────────────────
//  COMBAT LOGIC
// ─────────────────────────────────────────────
function rng(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function doAction(player, actionIdx) {
  if (gs.over || player !== gs.turn) return;
  const atk = player === 1 ? gs.p1 : gs.p2;
  const def = player === 1 ? gs.p2 : gs.p1;
  const atkPre = `p${player}`;
  const defPre = player === 1 ? 'p2' : 'p1';
  const action = atk.actions[actionIdx];

  // Mana check
  if (atk.mp < action.mpCost) {
    addLog(`${atk.name} doesn't have enough MP for ${action.name}!`, 'sys');
    return;
  }

  // Stun check
  if (atk.stunned) {
    atk.stunned = false;
    addLog(`${atk.name} is stunned and loses their turn!`, 'sys');
    endTurn();
    return;
  }

  atk.mp = Math.max(0, atk.mp - action.mpCost);

  // Animate
  triggerAnim(`${atkPre}-panel`, 'attack');
  setTimeout(() => triggerAnim(`${defPre}-panel`, 'hit'), 220);

  // ── HEAL ──
  if (action.heal) {
    const h = action.heal;
    atk.hp = Math.min(atk.maxHp, atk.hp + h);
    addLog(`${atk.name} uses ${action.name} and restores ${h} HP!`, atkPre);
    spawnFloat(`${atkPre}-panel`, `+${h} ❤️`, '#97c459');
  }
  // ── SHIELD ──
  else if (action.shield) {
    atk.shield += action.shield;
    addLog(`${atk.name} raises a shield of ${action.shield}!`, atkPre);
    spawnFloat(`${atkPre}-panel`, `🛡️ +${action.shield}`, '#ef9f27');
  }
  // ── EVADE ──
  else if (action.evade) {
    atk.evade = true;
    addLog(`${atk.name} disappears into smoke — next attack will miss!`, atkPre);
  }
  // ── DAMAGE ──
  else {
    // Buff (Battle Cry effect applied next turn)
    if (action.buff) {
      atk.buffed = true;
      addLog(`${atk.name} unleashes a Battle Cry! Next attack is boosted!`, atkPre);
    }

    const hits = action.hits || 1;
    let totalDmg = 0;
    let stunLanded = false;
    let poisonLanded = false;

    for (let h = 0; h < hits; h++) {
      // Evade check
      if (def.evade) {
        def.evade = false;
        addLog(`${def.name} evades the attack!`, 'sys');
        continue;
      }

      let dmg = rng(action.dmg[0], action.dmg[1]);

      // Buff bonus
      if (atk.buffed && !action.buff) {
        dmg = Math.floor(dmg * 1.3);
        atk.buffed = false;
      }

      // Crit
      let isCrit = false;
      if (action.crit && Math.random() < action.crit) {
        dmg = Math.floor(dmg * 1.85);
        isCrit = true;
      }

      // Slow penalty on attacker
      if (atk.slowed) {
        dmg = Math.floor(dmg * 0.75);
        atk.slowed = false;
      }

      // Shield absorption
      if (def.shield > 0) {
        const absorbed = Math.min(def.shield, dmg);
        def.shield -= absorbed;
        dmg -= absorbed;
        if (absorbed > 0) addLog(`${def.name}'s shield absorbs ${absorbed} damage!`, 'sys');
      }

      def.hp -= dmg;
      totalDmg += dmg;

      if (isCrit) {
        addLog(`💥 CRITICAL! ${atk.name} hits for ${dmg}!`, 'log-crit');
        spawnFloat(`${defPre}-panel`, `💥 ${dmg}!`, '#f09595');
      }

      // Stun
      if (!stunLanded && action.stun && Math.random() < 0.45) {
        def.stunned = true;
        stunLanded = true;
      }
      // Poison
      if (!poisonLanded && action.poison) {
        def.poison = action.poison;
        poisonLanded = true;
      }
      // Slow
      if (action.slow) def.slowed = true;
    }

    if (!action.buff) {
      const logClass = atkPre === 'p1' ? 'p1' : 'p2';
      if (!action.crit || hits > 1) {
        addLog(`${atk.name} uses ${action.name} for ${totalDmg} damage!`, logClass);
        if (totalDmg > 0) spawnFloat(`${defPre}-panel`, `-${totalDmg}`, '#e24b4a');
      }
      if (stunLanded)   addLog(`${def.name} is stunned!`, 'sys');
      if (poisonLanded) addLog(`${def.name} is poisoned! (${action.poison} dmg/turn)`, 'sys');
      if (action.slow && !def.slowed) addLog(`${def.name} is slowed!`, 'sys');
    }

    // Check death
    if (def.hp <= 0) {
      def.hp = 0;
      renderAll();
      setTimeout(() => endGame(atk, def), 600);
      return;
    }
  }

  endTurn();
}

function endTurn() {
  // Apply poison to next turn's target (the one who just acted = defender now acts)
  const next = gs.turn === 1 ? gs.p2 : gs.p1;
  const nextPre = gs.turn === 1 ? 'p2' : 'p1';

  if (next.poison > 0) {
    next.hp -= next.poison;
    addLog(`☠️ ${next.name} takes ${next.poison} poison damage!`, 'sys');
    spawnFloat(`${nextPre}-panel`, `☠️ -${next.poison}`, '#97c459');
    if (next.hp <= 0) {
      next.hp = 0;
      const winner = gs.turn === 1 ? gs.p1 : gs.p2;
      renderAll();
      setTimeout(() => endGame(winner, next), 600);
      return;
    }
    next.poison = Math.max(0, next.poison - 2); // poison fades
  }

  // Regen a little MP
  const cur = gs.turn === 1 ? gs.p1 : gs.p2;
  cur.mp = Math.min(cur.maxMp, cur.mp + 4);

  gs.turn = gs.turn === 1 ? 2 : 1;
  renderAll();
}

function endGame(winner, loser) {
  gs.over = true;
  renderAll();
  const wPlayer = winner === gs.p1 ? 'PLAYER 1' : 'PLAYER 2';
  document.getElementById('winner-emoji').textContent = CLASSES.find(c => c.name === winner.name).emoji;
  document.getElementById('winner-name').textContent = `${wPlayer} — ${winner.name}`;
  document.getElementById('winner-msg').textContent = `${loser.name} has fallen. The champion stands!`;
  setTimeout(() => showScreen('winner-screen'), 800);
}

// ─────────────────────────────────────────────
//  UTILITY
// ─────────────────────────────────────────────
function addLog(msg, cls) {
  const log = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `log-entry log-${cls}`;
  entry.textContent = msg;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function triggerAnim(panelId, type) {
  const el = document.getElementById(panelId);
  if (!el) return;
  el.classList.remove('anim-attack', 'anim-hit');
  void el.offsetWidth; // reflow
  el.classList.add(type === 'attack' ? 'anim-attack' : 'anim-hit');
  setTimeout(() => el.classList.remove('anim-attack', 'anim-hit'), 400);
}

function spawnFloat(panelId, text, color) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const el = document.createElement('div');
  el.className = 'float-num';
  el.textContent = text;
  el.style.color = color;
  el.style.left = (30 + Math.random() * 40) + '%';
  el.style.top = '20%';
  panel.style.position = 'relative';
  panel.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function goToSelect() {
  showScreen('select-screen');
  buildPickers();
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
buildPickers();
</script>
</body>
</html>
